<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة متقدمة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --glow: 0 0 20px rgba(0,229,255,0.3);
    --glow2: 0 0 20px rgba(255,107,53,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,229,255,0.06) 0%, transparent 50%);
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--panel);
    padding: 6px;
    border-radius: 14px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.3s;
    background: transparent;
    color: var(--text-dim);
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    color: white;
    box-shadow: var(--glow);
  }

  .section { display: none; width: 100%; max-width: 900px; }
  .section.active { display: block; }

  /* CALCULATOR */
  .calc-wrapper {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .display {
    background: var(--panel);
    padding: 24px 20px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .display-history {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
    min-height: 22px;
    margin-bottom: 8px;
  }

  .display-main {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.4rem;
    color: var(--accent);
    text-shadow: var(--glow);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    direction: ltr;
    text-align: right;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
  }

  .btn {
    padding: 18px 8px;
    border: none;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.15s;
    background: var(--card);
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:active::after { opacity: 0.08; }

  .btn:hover { background: #1e1e2e; }

  .btn.op { color: var(--accent); }
  .btn.fn { color: #a78bfa; font-size: 0.85rem; }
  .btn.eq {
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    color: white;
    box-shadow: var(--glow);
    font-size: 1.4rem;
  }
  .btn.eq:hover { filter: brightness(1.15); }
  .btn.clear { color: var(--accent2); }
  .btn.zero { grid-column: span 2; }

  /* GRAPH */
  .graph-wrapper {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .graph-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .graph-input {
    flex: 1;
    min-width: 200px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    outline: none;
    direction: ltr;
    transition: border-color 0.3s;
  }

  .graph-input:focus { border-color: var(--accent); box-shadow: var(--glow); }

  .range-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .range-input {
    width: 70px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    text-align: center;
    direction: ltr;
  }

  .range-input:focus { border-color: var(--accent); }

  .graph-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--glow);
    transition: filter 0.2s;
    white-space: nowrap;
  }

  .graph-btn:hover { filter: brightness(1.15); }

  .canvas-wrap {
    position: relative;
    background: var(--panel);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 16px;
  }

  canvas { border-radius: 8px; }

  .presets {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .preset-btn {
    padding: 6px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  label { color: var(--text-dim); font-size: 0.85rem; }
  .error-msg { color: var(--accent2); font-size: 0.85rem; margin-top: 8px; min-height: 20px; }
</style>
</head>
<body>

<h1>🧮 آلة حاسبة متقدمة</h1>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calc')">الحاسبة</button>
  <button class="tab" onclick="switchTab('graph')">الرسوم البيانية</button>
</div>

<!-- CALCULATOR TAB -->
<div class="section active" id="calc">
  <div class="calc-wrapper">
    <div class="display">
      <div class="display-history" id="history"></div>
      <div class="display-main" id="display">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn fn" onclick="calcFn('sin(')">sin</button>
      <button class="btn fn" onclick="calcFn('cos(')">cos</button>
      <button class="btn fn" onclick="calcFn('tan(')">tan</button>
      <button class="btn fn" onclick="calcFn('log(')">log</button>
      <button class="btn fn" onclick="calcFn('ln(')">ln</button>
      <!-- Row 2 -->
      <button class="btn fn" onclick="calcFn('sqrt(')">√</button>
      <button class="btn fn" onclick="calcFn('**')">xʸ</button>
      <button class="btn fn" onclick="calcFn('Math.PI')">π</button>
      <button class="btn fn" onclick="calcFn('Math.E')">e</button>
      <button class="btn fn" onclick="calcFn('(')">(  )</button>
      <!-- Row 3 -->
      <button class="btn clear" onclick="clearAll()">AC</button>
      <button class="btn clear" onclick="clearEntry()">CE</button>
      <button class="btn clear" onclick="backspace()">⌫</button>
      <button class="btn fn" onclick="calcFn('%')">%</button>
      <button class="btn op" onclick="calcFn('/')">÷</button>
      <!-- Row 4 -->
      <button class="btn" onclick="calcFn('7')">7</button>
      <button class="btn" onclick="calcFn('8')">8</button>
      <button class="btn" onclick="calcFn('9')">9</button>
      <button class="btn fn" onclick="calcFn('abs(')">|x|</button>
      <button class="btn op" onclick="calcFn('*')">×</button>
      <!-- Row 5 -->
      <button class="btn" onclick="calcFn('4')">4</button>
      <button class="btn" onclick="calcFn('5')">5</button>
      <button class="btn" onclick="calcFn('6')">6</button>
      <button class="btn fn" onclick="calcFn('1/')">1/x</button>
      <button class="btn op" onclick="calcFn('-')">−</button>
      <!-- Row 6 -->
      <button class="btn" onclick="calcFn('1')">1</button>
      <button class="btn" onclick="calcFn('2')">2</button>
      <button class="btn" onclick="calcFn('3')">3</button>
      <button class="btn fn" onclick="calcFn('**2')">x²</button>
      <button class="btn op" onclick="calcFn('+')">+</button>
      <!-- Row 7 -->
      <button class="btn zero" onclick="calcFn('0')">0</button>
      <button class="btn" onclick="calcFn('.')">.</button>
      <button class="btn fn" onclick="toggleSign()">±</button>
      <button class="btn eq" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<!-- GRAPH TAB -->
<div class="section" id="graph">
  <div class="graph-wrapper">
    <div class="graph-controls">
      <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px">
        <label>أدخل الدالة f(x) =</label>
        <input class="graph-input" id="funcInput" type="text" value="sin(x)" placeholder="مثال: x*x أو sin(x)" dir="ltr"/>
      </div>
      <div class="range-controls">
        <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
          <label>من</label>
          <input class="range-input" id="xMin" type="number" value="-10"/>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
          <label>إلى</label>
          <input class="range-input" id="xMax" type="number" value="10"/>
        </div>
        <button class="graph-btn" onclick="drawGraph()">📊 ارسم</button>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="myChart" height="350"></canvas>
    </div>
    <div class="error-msg" id="graphError"></div>
    <div class="presets">
      <span style="color:var(--text-dim);font-size:0.85rem;align-self:center">أمثلة:</span>
      <button class="preset-btn" onclick="setPreset('sin(x)')">sin(x)</button>
      <button class="preset-btn" onclick="setPreset('cos(x)')">cos(x)</button>
      <button class="preset-btn" onclick="setPreset('x*x')">x²</button>
      <button class="preset-btn" onclick="setPreset('x*x*x')">x³</button>
      <button class="preset-btn" onclick="setPreset('Math.sqrt(Math.abs(x))')">√|x|</button>
      <button class="preset-btn" onclick="setPreset('Math.log(Math.abs(x)+1)')">ln(|x|+1)</button>
      <button class="preset-btn" onclick="setPreset('1/x')">1/x</button>
      <button class="preset-btn" onclick="setPreset('Math.tan(x)')">tan(x)</button>
      <button class="preset-btn" onclick="setPreset('Math.exp(-x*x/2)')">e^(-x²/2)</button>
    </div>
  </div>
</div>

<script>
// ===== CALCULATOR =====
let expr = '';
let lastResult = null;
let justCalc = false;

function updateDisplay(val) {
  const d = document.getElementById('display');
  d.textContent = val || '0';
  d.style.fontSize = val.length > 12 ? '1.5rem' : val.length > 8 ? '1.9rem' : '2.4rem';
}

function calcFn(val) {
  if (justCalc && /[\d(]/.test(val)) { expr = ''; justCalc = false; }
  if (justCalc && /[+\-*\/]/.test(val)) { justCalc = false; }
  
  // Handle parentheses auto-close
  if (val === '(  )') {
    const opens = (expr.match(/\(/g) || []).length;
    const closes = (expr.match(/\)/g) || []).length;
    val = opens > closes ? ')' : '(';
  }

  expr += val;
  let display = expr
    .replace(/Math\.PI/g, 'π')
    .replace(/Math\.E/g, 'e')
    .replace(/Math\.sqrt/g, '√')
    .replace(/Math\.abs/g, 'abs')
    .replace(/\*\*/g, '^')
    .replace(/\*/g, '×')
    .replace(/\//g, '÷');
  updateDisplay(display);
}

function clearAll() {
  expr = '';
  document.getElementById('history').textContent = '';
  updateDisplay('0');
  justCalc = false;
}

function clearEntry() {
  expr = '';
  updateDisplay('0');
}

function backspace() {
  expr = expr.slice(0, -1);
  let display = expr.replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e').replace(/\*\*/g,'^').replace(/\*/g,'×').replace(/\//g,'÷');
  updateDisplay(display || '0');
}

function toggleSign() {
  if (expr) { expr = '-(' + expr + ')'; calcFn(''); }
}

function calculate() {
  if (!expr) return;
  try {
    let evalExpr = expr
      .replace(/sin\(/g, 'Math.sin(')
      .replace(/cos\(/g, 'Math.cos(')
      .replace(/tan\(/g, 'Math.tan(')
      .replace(/log\(/g, 'Math.log10(')
      .replace(/ln\(/g, 'Math.log(')
      .replace(/sqrt\(/g, 'Math.sqrt(')
      .replace(/abs\(/g, 'Math.abs(')
      .replace(/π/g, 'Math.PI');

    // Auto close parens
    const opens = (evalExpr.match(/\(/g) || []).length;
    const closes = (evalExpr.match(/\)/g) || []).length;
    evalExpr += ')'.repeat(Math.max(0, opens - closes));

    const result = Function('"use strict"; return (' + evalExpr + ')')();
    
    if (!isFinite(result)) throw new Error('غير معرّف');
    
    const rounded = Math.round(result * 1e10) / 1e10;
    document.getElementById('history').textContent = 
      expr.replace(/\*/g,'×').replace(/\//g,'÷').replace(/\*\*/g,'^').replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e') + ' =';
    
    expr = String(rounded);
    updateDisplay(rounded.toLocaleString('en'));
    lastResult = rounded;
    justCalc = true;
  } catch (e) {
    updateDisplay('خطأ');
    setTimeout(() => { updateDisplay(expr || '0'); }, 1200);
  }
}

document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') calcFn(e.key);
  else if (e.key === '+') calcFn('+');
  else if (e.key === '-') calcFn('-');
  else if (e.key === '*') calcFn('*');
  else if (e.key === '/') { e.preventDefault(); calcFn('/'); }
  else if (e.key === '.') calcFn('.');
  else if (e.key === 'Enter' || e.key === '=') calculate();
  else if (e.key === 'Backspace') backspace();
  else if (e.key === 'Escape') clearAll();
});

// ===== GRAPH =====
let chartInstance = null;

function setPreset(fn) {
  document.getElementById('funcInput').value = fn;
  drawGraph();
}

function drawGraph() {
  const fnStr = document.getElementById('funcInput').value.trim();
  const xMin = parseFloat(document.getElementById('xMin').value) || -10;
  const xMax = parseFloat(document.getElementById('xMax').value) || 10;
  const errEl = document.getElementById('graphError');
  errEl.textContent = '';

  if (!fnStr) { errEl.textContent = 'الرجاء إدخال دالة رياضية'; return; }
  if (xMin >= xMax) { errEl.textContent = 'يجب أن يكون الحد الأدنى أصغر من الحد الأقصى'; return; }

  const steps = 500;
  const dx = (xMax - xMin) / steps;
  const labels = [], data = [];

  for (let i = 0; i <= steps; i++) {
    const x = xMin + i * dx;
    labels.push(Math.round(x * 100) / 100);
    try {
      const y = Function('"use strict"; const x=' + x + '; return ' + fnStr)();
      data.push(isFinite(y) ? Math.round(y * 1e8) / 1e8 : null);
    } catch { data.push(null); }
  }

  const ctx = document.getElementById('myChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'f(x) = ' + fnStr,
        data,
        borderColor: '#00e5ff',
        backgroundColor: 'rgba(0,229,255,0.05)',
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0.1,
        fill: true,
        spanGaps: false,
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 600, easing: 'easeInOutQuart' },
      plugins: {
        legend: {
          labels: { color: '#e8e8f0', font: { family: 'Cairo', size: 13 } }
        },
        tooltip: {
          backgroundColor: '#16161f',
          borderColor: '#2a2a3a',
          borderWidth: 1,
          titleColor: '#00e5ff',
          bodyColor: '#e8e8f0',
          callbacks: {
            title: items => 'x = ' + items[0].label,
            label: item => 'y = ' + item.raw
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#6b6b8a',
            maxTicksLimit: 10,
            font: { family: 'Share Tech Mono', size: 11 }
          },
          grid: { color: 'rgba(42,42,58,0.8)' },
          border: { color: '#2a2a3a' }
        },
        y: {
          ticks: {
            color: '#6b6b8a',
            maxTicksLimit: 8,
            font: { family: 'Share Tech Mono', size: 11 }
          },
          grid: { color: 'rgba(42,42,58,0.8)' },
          border: { color: '#2a2a3a' }
        }
      }
    }
  });
}

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'graph' && !chartInstance) drawGraph();
}

// Draw initial graph
setTimeout(drawGraph, 300);
</script>
</body>
</html>
